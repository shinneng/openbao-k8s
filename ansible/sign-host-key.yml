---
- name: Sign SSH Host Keys and Configure Host-Based Verification
  hosts: all
  become: true
  vars:
    bao_addr: "https://bao.example.com"
    host_signer_path: "ssh-host-signer"
    host_role: "hostrole"
    # Using the standard RSA host key as an example
    host_key_path: "/etc/ssh/ssh_host_rsa_key.pub"
    host_cert_path: "/etc/ssh/ssh_host_rsa_key-cert.pub"

  tasks:
    - name: Read Host Public Key
      ansible.builtin.slurp:
        src: "{{ host_key_path }}"
      register: host_pub_key

    - name: Sign Host Key locally using OpenBao
      delegate_to: localhost
      become: false
      ansible.builtin.shell:
        cmd: "bao write -field=signed_key {{ host_signer_path }}/sign/{{ host_role }} public_key='{{ host_pub_key.content | b64decode }}' cert_type=host"
      register: host_cert
      failed_when: host_cert.rc != 0

    - name: Deploy Signed Host Certificate to server
      ansible.builtin.copy:
        content: "{{ host_cert.stdout }}"
        dest: "{{ host_cert_path }}"
        mode: '0640'
        owner: root
        group: root

    - name: Configure SSHD to use the Host Certificate
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?HostCertificate'
        line: "HostCertificate {{ host_cert_path }}"
        state: present
      notify: Restart SSHD

  handlers:
    - name: Restart SSHD
      ansible.builtin.service:
        name: ssh
        state: restarted
