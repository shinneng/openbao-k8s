apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-setup-script
  namespace: openbao
data:
  setup.sh: |
    #!/bin/sh
    set -e

    export BAO_ADDR="https://openbao.openbao.svc:8200"
    export BAO_SKIP_VERIFY=true # For internal cluster access with self-signed certs

    # Wait for OpenBao to be ready and unsealed
    echo "Waiting for OpenBao..."
    until bao status > /dev/null 2>&1; do
      sleep 5
    done
    echo "OpenBao is ready."

    # 1. Enable SSH CA for Client-Side Dynamic Signing
    if ! bao secrets list | grep -q "ssh-client-signer/"; then
      echo "Enabling SSH Client Secrets Engine..."
      bao secrets enable -path=ssh-client-signer ssh
      # FIXED: Changed generate_signing_key=true to generate=true
      bao write ssh-client-signer/config/ca generate=true
    fi
    # Ensure client-signer role is configured
    bao write ssh-client-signer/roles/production-role \
        key_type=ca \
        allow_user_certificates=true \
        allowed_users="ubuntu,ansible" \
        default_user="ubuntu" \
        ttl="30m0s"

    # 2. Enable SSH Host Signer (To verify server identity back to engineers)
    if ! bao secrets list | grep -q "ssh-host-signer/"; then
      echo "Enabling SSH Host Signer..."
      bao secrets enable -path=ssh-host-signer ssh
      # FIXED: Changed generate_signing_key=true to generate=true
      bao write ssh-host-signer/config/ca generate=true
    fi
    # Ensure hostrole is configured
    bao write ssh-host-signer/roles/hostrole \
        key_type=ca \
        allow_host_certificates=true \
        allow_any_host=true \
        ttl="8760h"

    # 3. Enable Transit for PII
    if ! bao secrets list | grep -q "transit/"; then
      echo "Enabling Transit Secrets Engine..."
      bao secrets enable transit
      bao write -f transit/keys/pii-data-key
    fi

    # 4. Enable AppRole Auth Method & Policy for Applications
    if ! bao auth list | grep -q "approle/"; then
      echo "Enabling AppRole Auth Method..."
      bao auth enable approle
      bao policy write web-app - <<EOF
    path "transit/encrypt/pii-data-key" { capabilities = ["update"] }
    EOF
      bao write auth/approle/role/web-app \
          secret_id_ttl=10m \
          token_num_uses=10 \
          token_ttl=20m \
          token_max_ttl=30m \
          policies="web-app"
    fi

    # 5. NEW: Policy for Engineers running retrieve-and-run.sh
    # Grants execution rights to the dynamic SSH endpoint instead of the old KV block
    echo "Creating Engineer JIT SSH Signing Policy..."
    bao policy write engineer-ssh - <<EOF
    path "ssh-client-signer/sign/production-role" {
      capabilities = ["update"]
    }
    EOF

    echo "Configuration complete."
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-config
  namespace: openbao
spec:
  template:
    spec:
      containers:
      - name: setup
        # Replaced 'latest' with a stable tagged version for deterministic cluster building
        image: openbao/openbao:2.5.4
        command: ["/bin/sh", "/scripts/setup.sh"]
        env:
        - name: BAO_TOKEN
          valueFrom:
            secretKeyRef:
              name: openbao-root-token
              key: token
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      restartPolicy: OnFailure
      volumes:
      - name: scripts
        configMap:
          name: openbao-setup-script
  backoffLimit: 4
