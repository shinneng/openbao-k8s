apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: semaphoreui
  namespace: semaphoreui
spec:
  releaseName: semaphore
  chart:
    spec:
      chart: semaphore
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
        namespace: flux-system
  interval: 1h
  dependsOn:
    - name: cnpg-operator
      namespace: cnpg-system
  values:
    image:
      repository: semaphoreui/semaphore
      tag: latest
    database:
      type: postgres
      host: semaphore-db-rw
      port: 5432
      name: semaphore
      existingSecret: semaphore-db-creds
    # Expose via Istio (could be added to external-access.yaml)
    service:
      type: ClusterIP
